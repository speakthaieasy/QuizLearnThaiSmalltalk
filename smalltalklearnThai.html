let current = 0;
let score = 0;

function loadQuestion() {
  const q = quiz[current];
  const box = document.getElementById("quiz");

  box.innerHTML = `
    <div class="thai">${q.q}</div>
    <div class="phonetic">${q.p}</div>
    <div>
      ${q.options.map((opt, i) => 
        `<div class="option" onclick="checkAnswer(${i})">${String.fromCharCode(3585 + i)}) ${opt}</div>`
      ).join("")}
    </div>
  `;
}

function checkAnswer(i) {
  const feedback = document.getElementById("feedback");

  if (i === quiz[current].answer) {
    feedback.innerHTML = "✅ Correct!";
    score++;
  } else {
    feedback.innerHTML = "❌ Wrong!";
  }

  setTimeout(() => {
    current++;
    feedback.innerHTML = "";

    if (current < quiz.length) {
      loadQuestion();
    } else {
      document.getElementById("quiz").innerHTML =
        `<h3>Quiz Finished</h3><p>Your score: ${score} / ${quiz.length}</p>`;
    }
  }, 800);
}
